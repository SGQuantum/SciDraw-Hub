<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科研绘图工具全景展示平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        /* =========================================================
           SciDraw Hub 单文件版
           修改重点：
           1. 示例图片：搜索 "示例图片配置区" 或 buildExampleSVG
           2. 代码示例：搜索 "代码示例配置区" 或 detailTemplates
           3. 工具数据：搜索 "工具数据区" 或 toolsData
           ========================================================= */

        /* ========== 基础变量 - 深色主题 ========== */
        :root {
            --bg-primary: #07071a;
            --bg-secondary: #0d0d2b;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.18);
            --text-primary: #f0f0ff;
            --text-secondary: rgba(240, 240, 255, 0.65);
            --text-muted: rgba(240, 240, 255, 0.35);
            --sidebar-w: 270px;

            --c1: #4facfe; --c1g: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --c2: #a855f7; --c2g: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            --c3: #10b981; --c3g: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --c4: #f59e0b; --c4g: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            --c5: #ec4899; --c5g: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            --c6: #06b6d4; --c6g: linear-gradient(135deg, #06b6d4 0%, #67e8f9 100%);
            --c7: #f97316; --c7g: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            --c8: #8b5cf6; --c8g: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(15, 23, 42, 0.04);
            --bg-card-hover: rgba(15, 23, 42, 0.08);
            --border: rgba(15, 23, 42, 0.08);
            --border-hover: rgba(15, 23, 42, 0.15);
            --text-primary: #0f172a;
            --text-secondary: rgba(15, 23, 42, 0.65);
            --text-muted: rgba(15, 23, 42, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .bg-mesh { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .bg-mesh::before {
            content: "";
            position: absolute;
            top: -30%; left: -20%;
            width: 60%; height: 80%;
            background: radial-gradient(ellipse, rgba(79, 172, 254, 0.06) 0%, transparent 70%);
            animation: meshFloat1 25s ease-in-out infinite;
        }
        .bg-mesh::after {
            content: "";
            position: absolute;
            bottom: -20%; right: -10%;
            width: 50%; height: 70%;
            background: radial-gradient(ellipse, rgba(168, 85, 247, 0.05) 0%, transparent 70%);
            animation: meshFloat2 30s ease-in-out infinite;
        }
        @keyframes meshFloat1 { 50% { transform: translate(3%, 2%); } }
        @keyframes meshFloat2 { 50% { transform: translate(-2%, -3%); } }

        .app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

        .sidebar {
            width: var(--sidebar-w);
            background: var(--bg-secondary);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            inset: 0 auto 0 0;
            height: 100vh;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .sidebar.collapsed { width: 70px; }
        .sidebar.collapsed .logo-text,
        .sidebar.collapsed .logo-sub,
        .sidebar.collapsed .nav-text,
        .sidebar.collapsed .nav-count,
        .sidebar.collapsed .nav-label,
        .sidebar.collapsed .sidebar-stats { opacity: 0; visibility: hidden; }

        .sidebar-toggle {
            position: absolute;
            top: 50%; right: -14px;
            transform: translateY(-50%);
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 101;
        }
        .sidebar-toggle:hover { background: var(--c1); color: #fff; border-color: var(--c1); }
        .sidebar.collapsed .sidebar-toggle i { transform: rotate(180deg); }

        .sidebar-logo { padding: 1.5rem 1.25rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
        .logo-inner { display: flex; align-items: center; gap: 0.85rem; }
        .logo-icon-wrap {
            width: 42px; height: 42px;
            border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--c1), var(--c2));
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            flex-shrink: 0;
        }
        .logo-text { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.3px; }
        .logo-sub { font-size: 0.68rem; color: var(--text-muted); }

        .sidebar-nav { flex: 1; padding: 1rem 0.75rem; overflow-y: auto; overflow-x: hidden; }
        .nav-label {
            padding: 0.6rem 0.9rem 0.3rem;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .nav-item {
            display: flex; align-items: center; gap: 0.85rem;
            padding: 0.75rem 0.9rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            position: relative;
            margin-bottom: 0.15rem;
            border: 1px solid transparent;
            user-select: none;
            white-space: nowrap;
        }
        .nav-item:hover, .nav-item.active { background: var(--bg-card-hover); color: var(--text-primary); }
        .nav-item.active { border-color: var(--border); }
        .nav-item.active::before {
            content: "";
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            width: 3px; height: 60%;
            border-radius: 0 3px 3px 0;
            background: var(--nav-accent, var(--text-secondary));
        }
        .nav-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .nav-text { font-size: 0.88rem; font-weight: 500; flex: 1; }
        .nav-count {
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.07);
            color: var(--text-muted);
        }
        .nav-item[data-cat="home"] { --nav-accent: var(--text-secondary); }
        .nav-item[data-cat="flowchart"] { --nav-accent: var(--c1); }
        .nav-item[data-cat="mindmap"] { --nav-accent: var(--c2); }
        .nav-item[data-cat="chart"] { --nav-accent: var(--c3); }
        .nav-item[data-cat="3dmodel"] { --nav-accent: var(--c4); }
        .nav-item[data-cat="code"] { --nav-accent: var(--c5); }
        .nav-item[data-cat="sim"] { --nav-accent: var(--c6); }
        .nav-item[data-cat="science"] { --nav-accent: var(--c7); }
        .nav-item[data-cat="aiart"] { --nav-accent: var(--c8); }
        .nav-item[data-cat="home"] .nav-icon { background: rgba(255,255,255,0.08); }
        .nav-item[data-cat="flowchart"] .nav-icon { background: rgba(79,172,254,0.12); color: var(--c1); }
        .nav-item[data-cat="mindmap"] .nav-icon { background: rgba(168,85,247,0.12); color: var(--c2); }
        .nav-item[data-cat="chart"] .nav-icon { background: rgba(16,185,129,0.12); color: var(--c3); }
        .nav-item[data-cat="3dmodel"] .nav-icon { background: rgba(245,158,11,0.12); color: var(--c4); }
        .nav-item[data-cat="code"] .nav-icon { background: rgba(236,72,153,0.12); color: var(--c5); }
        .nav-item[data-cat="sim"] .nav-icon { background: rgba(6,182,212,0.12); color: var(--c6); }
        .nav-item[data-cat="science"] .nav-icon { background: rgba(249,115,22,0.12); color: var(--c7); }
        .nav-item[data-cat="aiart"] .nav-icon { background: rgba(139,92,246,0.12); color: var(--c8); }

        .sidebar-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
        .sidebar-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
        .s-stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem; text-align: center; white-space: nowrap; }
        .s-stat .n { font-size: 1.25rem; font-weight: 800; }
        .s-stat .l { font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase; margin-top: 0.15rem; }

        .main { flex: 1; margin-left: var(--sidebar-w); min-height: 100vh; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
        .sidebar.collapsed + .main { margin-left: 70px; }

        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar-title h1 { font-size: 1.3rem; font-weight: 700; }
        .breadcrumb { font-size: 0.8rem; color: var(--text-muted); }
        .breadcrumb span { color: var(--text-secondary); }
        .topbar-right { display: flex; align-items: center; gap: 0.75rem; }
        .search-box {
            display: flex; align-items: center; gap: 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.9rem;
        }
        .search-box:focus-within { border-color: rgba(102,126,234,0.4); box-shadow: 0 0 15px rgba(102,126,234,0.1); }
        .search-box input { background: none; border: none; outline: none; color: var(--text-primary); font-size: 0.85rem; width: 200px; }
        .search-box input::placeholder, .search-box i { color: var(--text-muted); }
        .topbar-btn {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-secondary); cursor: pointer;
        }
        .topbar-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .topbar-btn.theme-toggle.active { background: var(--c1); color: #fff; border-color: var(--c1); }

        .content-area { padding: 2rem; }
        .page { display: none; opacity: 0; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
        .page.active { display: block; opacity: 1; transform: translateY(0); }

        .hero { text-align: center; padding: 3rem 1rem 2rem; }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.45rem 1.1rem;
            background: rgba(102,126,234,0.12);
            border: 1px solid rgba(102,126,234,0.25);
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--c1);
            margin-bottom: 1.25rem;
        }
        .hero h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; line-height: 1.25; margin-bottom: 1rem; }
        .grad { background: linear-gradient(135deg, var(--c1), var(--c2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-secondary); max-width: 580px; margin: 0 auto 2rem; }
        .hero-stats { display: flex; justify-content: center; gap: 3rem; flex-wrap: wrap; }
        .h-stat .num { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--c1), var(--c2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .h-stat .lab { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.15rem; }

        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; margin-top: 2.5rem; }
        .cat-card, .tool-card, .detail-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
        .cat-card {
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
            position: relative;
            overflow: hidden;
        }
        .cat-card::after, .tool-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; opacity: 0; transition: opacity 0.3s; background: var(--accent-grad); }
        .cat-card:hover, .tool-card:hover { transform: translateY(-6px); border-color: var(--border-hover); box-shadow: 0 15px 35px rgba(0,0,0,0.25); }
        .cat-card:hover::after, .tool-card:hover::before { opacity: 1; }
        .cat-card-header, .card-hdr { display: flex; align-items: flex-start; gap: 0.9rem; margin-bottom: 1rem; }
        .cat-card-icon, .card-icon {
            width: 48px; height: 48px; border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
            background: color-mix(in srgb, var(--accent) 14%, transparent);
            color: var(--accent);
        }
        .cat-card-name, .card-name { font-size: 1.05rem; font-weight: 700; }
        .cat-card-num, .card-vendor { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.1rem; }
        .cat-card-desc, .card-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 1rem; }
        .cat-card-tags, .card-tags, .platform-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .cat-tag, .t-tag, .plat-tag {
            padding: 0.22rem 0.6rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 6px;
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .page-header { margin-bottom: 2rem; }
        .page-header-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
        .page-icon-lg { width: 54px; height: 54px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
        .page-title { font-size: 1.6rem; font-weight: 800; }
        .page-desc { font-size: 0.88rem; color: var(--text-secondary); margin-top: 0.2rem; }
        .page-line { flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1.25rem; }
        .tool-card { padding: 1.6rem; transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); animation: cardIn 0.5s ease both; position: relative; overflow: hidden; cursor: pointer; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        .card-info { flex: 1; }
        .card-badge { padding: 0.2rem 0.65rem; border-radius: 20px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; }
        .badge-free { background: rgba(16,185,129,0.12); color: var(--c3); }
        .badge-pro { background: rgba(168,85,247,0.12); color: var(--c2); }
        .badge-open { background: rgba(245,158,11,0.12); color: var(--c4); }
        .badge-enterprise { background: rgba(79,172,254,0.12); color: var(--c1); }
        .badge-trial { background: rgba(6,182,212,0.12); color: var(--c6); }
        .badge-basic { background: rgba(148,163,184,0.14); color: #94a3b8; }
        .card-tags, .platform-tags { margin-bottom: 1.1rem; }
        .card-ftr { display: flex; justify-content: space-between; align-items: center; padding-top: 0.9rem; border-top: 1px solid var(--border); }
        .card-links { display: flex; gap: 0.85rem; }
        .c-link { color: var(--text-muted); text-decoration: none; font-size: 0.78rem; display: flex; align-items: center; gap: 0.3rem; }
        .c-link:hover { color: var(--c1); }
        .card-stars { display: flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; color: var(--text-muted); }
        .view-detail-btn { margin-top: 0.8rem; display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.42rem 0.9rem; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; width: 100%; justify-content: center; background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
        .view-detail-btn:hover { background: color-mix(in srgb, var(--accent) 24%, transparent); }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: rgba(13, 13, 43, 0.96);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 92%;
            max-width: 920px;
            max-height: 88vh;
            overflow: hidden;
            position: relative;
            animation: modalIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        [data-theme="light"] .modal { background: rgba(255,255,255,0.98); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 3;
        }
        .modal-close:hover { background: rgba(239,68,68,0.12); color: #ef4444; border-color: rgba(239,68,68,0.3); }

        .detail-hero { padding: 1.45rem 2rem 1.2rem; border-bottom: 1px solid var(--border); background: radial-gradient(circle at 0% 0%, color-mix(in srgb, var(--detail-accent) 18%, transparent), transparent 35%); }
        .detail-hero-main { display: flex; align-items: center; gap: 1.2rem; padding-right: 3rem; }
        .detail-logo { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.65rem; flex-shrink: 0; background: color-mix(in srgb, var(--detail-accent) 14%, transparent); color: var(--detail-accent); border: 1px solid var(--border); }
        .detail-title-row { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; }
        .detail-title-row h2 { font-size: 1.45rem; line-height: 1.25; font-weight: 850; }
        .detail-subtitle { margin-top: 0.38rem; color: var(--text-muted); font-size: 0.82rem; display: flex; gap: 0.45rem; flex-wrap: wrap; }
        .detail-quick-badge { padding: 0.18rem 0.58rem; border-radius: 999px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-secondary); font-size: 0.72rem; }

        .detail-tabs { display: flex; gap: 0.45rem; padding: 0 2rem; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .detail-tab { border: none; background: transparent; color: var(--text-muted); padding: 0.92rem 0.95rem; cursor: pointer; font-size: 0.82rem; font-weight: 700; white-space: nowrap; position: relative; }
        .detail-tab:hover, .detail-tab.active { color: var(--text-primary); }
        .detail-tab.active::after { content: ""; position: absolute; left: 0.8rem; right: 0.8rem; bottom: 0; height: 2px; border-radius: 999px; background: var(--detail-accent); }
        .detail-body { padding: 1.7rem 2rem 2rem; max-height: calc(88vh - 175px); overflow-y: auto; }
        .detail-panel { display: none; }
        .detail-panel.active { display: block; animation: detailPanelIn 0.28s ease both; }
        @keyframes detailPanelIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .detail-card { padding: 1.25rem; margin-bottom: 1.25rem; }
        .detail-card-title { font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); font-weight: 800; margin-bottom: 0.85rem; }
        .detail-intro { color: var(--text-secondary); font-size: 0.92rem; line-height: 1.85; }
        .detail-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
        .detail-feature-list { list-style: none; display: grid; gap: 0.68rem; }
        .detail-feature-list li { display: flex; gap: 0.55rem; align-items: flex-start; color: var(--text-secondary); font-size: 0.86rem; }
        .detail-feature-list i { color: var(--detail-accent); margin-top: 0.24rem; font-size: 0.72rem; }
        .score-list { display: grid; gap: 0.65rem; }
        .score-row { display: grid; grid-template-columns: 5.2rem 1fr 2rem; gap: 0.7rem; align-items: center; font-size: 0.8rem; color: var(--text-muted); }
        .score-bar { height: 6px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
        .score-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--detail-accent), rgba(255,255,255,0.55)); }
        .score-num { color: var(--text-primary); font-weight: 800; text-align: right; }
        .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .pc-box { padding: 1rem; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.025); }
        .pc-box.pro { border-color: rgba(16,185,129,0.22); background: rgba(16,185,129,0.045); }

                                List<Double> values = new ArrayList<>();
                                int numSamples = 20;
                                double baseMean = 15.0 + random.nextDouble() * 5;

                                    double val = baseMean + random.nextGaussian() * 5;
                                    if (val > 0) values.add(val);
                                }
                                double[] vals = values.stream().mapToDouble(Double::doubleValue).toArray();
                                java.util.Arrays.sort(vals);
                                int n = vals.length;

                                // 计算统计量
                                double min = vals[0];
                                double max = vals[n-1];
                                double median = vals[n/2];
                                double q1 = vals[n/4];
                                double q3 = vals[3*n/4];

                                // 计算平均值
                                double mean = 0;
                                for (double v : vals) {
                                    mean += v;
                                }
                                mean /= n;

                                double lowerWhisker = Math.max(min, q1 - 1.5 * iqr);
                                double upperWhisker = Math.min(max, q3 + 1.5 * iqr);

        function getIcon(iconName) {
            return `<i class="fas ${iconName}"></i>`;

        function escapeHTML(str = '') {
            return String(str).replace(/[&<>'"]/g, s => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[s]));
        }

        function getPlatformIcon(platform) {
            const icons = {
                Web: 'fa-globe', Desktop: 'fa-desktop', Mobile: 'fa-mobile-alt', Chrome: 'fa-chrome',
                Python: 'fa-python', R: 'fa-chart-bar', Julia: 'fa-function', Java: 'fa-coffee',
                Discord: 'fa-discord', API: 'fa-plug', Colab: 'fa-google', Cpp: 'fa-code',
                'C++': 'fa-code', 'VSCode插件': 'fa-code', 'Markdown编辑器': 'fa-file-alt',
                Mac: 'fa-apple', iOS: 'fa-mobile-screen', App: 'fa-mobile-alt', '本地部署': 'fa-server', Server: 'fa-server'
            };
            return icons[platform] || 'fa-desktop';
        }

        function navigateTo(pageName) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.toggle('active', item.dataset.cat === pageName));
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(`page-${pageName}`)?.classList.add('active');
            const meta = categoryMeta[pageName];
            document.getElementById('pageHeading').textContent = meta?.name || '科研绘图工具全景展示平台';
            document.getElementById('breadcrumbCat').textContent = meta?.name || '首页';
            const searchInput = document.getElementById('searchInput');
            searchInput.placeholder = pageName === 'home' ? '搜索所有工具...' : `在 ${meta?.name || ''} 中搜索...`;
            currentPage = pageName;
            document.getElementById('sidebar')?.classList.remove('mobile-open');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (pageName !== 'home') history.pushState({ page: pageName }, '', `#${pageName}`);
            else history.pushState({ page: 'home' }, '', window.location.pathname);

        function getScoreSeed(tool, catKey) {
            const isEnterprise = /企业|工业|商业|Pro|专业|行业|标准/.test(tool.badgeText + tool.desc);
            const isCodeLike = ['chart', 'code'].includes(catKey) || tool.platforms.includes('Python') || tool.platforms.includes('API');
            return {
                ease: Math.max(68, Math.min(96, isEnterprise ? 74 : 86)),
                depth: Math.max(72, Math.min(98, isEnterprise ? 94 : 84)),
                output: Math.max(76, Math.min(96, isCodeLike ? 92 : 86)),
                collaboration: Math.max(62, Math.min(94, tool.features.some(f => /协作|云|团队|共享|多人/.test(f)) ? 90 : 72)),
                speed: Math.max(70, Math.min(95, /免费|开源/.test(tool.badgeText) ? 86 : 80))
            };
        }

        function cssVarToHex(cssVar) {

            return match ? getComputedStyle(document.documentElement).getPropertyValue(match[0]).trim() : '#4facfe';

        function renderOverviewPanel(tool, catKey, detail) {
            const scoreRows = [
                ['易用性', detail.scores.ease], ['功能深度', detail.scores.depth], ['输出质量', detail.scores.output], ['协作能力', detail.scores.collaboration], ['速度效率', detail.scores.speed]
            ].map(([k,v]) => `<div class="score-row"><span>${k}</span><div class="score-bar"><div class="score-fill" style="width:${v}%"></div></div><span class="score-num">${v}</span></div>`).join('');
            return `
                <div class="detail-card"><div class="detail-card-title">工具简介</div><p class="detail-intro">${escapeHTML(detail.intro)}</p></div>
                <div class="detail-two-col">
                    <div class="detail-card"><div class="detail-card-title">核心功能</div><ul class="detail-feature-list">${tool.features.map(f => `<li>${getIcon('fa-check')} <span>${escapeHTML(f)}</span></li>`).join('')}</ul></div>
                    <div class="detail-card"><div class="detail-card-title">综合评分</div><div class="score-list">${scoreRows}</div></div>
                </div>
                <div class="detail-card"><div class="detail-card-title">优缺点</div><div class="pros-cons"><div class="pc-box pro"><div class="pc-title">优点</div><ul>${detail.pros.map(p => `<li>${escapeHTML(p)}</li>`).join('')}</ul></div><div class="pc-box con"><div class="pc-title">局限</div><ul>${detail.cons.map(c => `<li>${escapeHTML(c)}</li>`).join('')}</ul></div></div></div>
                <div class="detail-card"><div class="detail-card-title">适用场景</div><div class="detail-chip-wrap">${tool.tags.map(t => `<span class="detail-chip">${escapeHTML(t)}</span>`).join('')}</div></div>`;
        }

        function renderExamplePanel(tool, catKey, detail) {
            const accent = cssVarToHex(categoryMeta[catKey]?.accent || 'var(--c1)');
            const html = `<div class="detail-card"><div class="detail-card-title">${escapeHTML(detail.exampleTitle)}</div><div class="example-canvas" data-tool-id="${tool.id}">${buildExampleSVG(tool, catKey, accent)}</div><p class="example-caption">${escapeHTML(detail.exampleCaption)}</p></div>`;
            return html;
        }

        function renderStepsPanel(detail) {
            return `<div class="steps-list">${detail.steps.map((s, idx) => `<div class="step-item"><div class="step-num">${idx + 1}</div><div><div class="step-title">${escapeHTML(s[0])}</div><div class="step-desc">${escapeHTML(s[1])}</div></div></div>`).join('')}</div>`;
        }

        function renderCodePanel(tool, detail) {
            // 优先使用工具数据里自带的 codeExample，如果没有，才用分类模板里的 code
            const code = tool.codeExample || detail.code; 
            const lang = tool.codeLang || detail.codeLang || 'Text';
            
            return `<div class="detail-card">
                <div class="detail-card-title">${escapeHTML(tool.name)} 代码示例</div>
                <div class="code-shell">
                    <div class="code-toolbar">
                        <div>${escapeHTML(lang)}</div>
                        <button class="copy-code-btn" data-copy-code>复制代码</button>
                    </div>
                    <pre><code id="detailCodeBlock">${escapeHTML(code)}</code></pre>
                </div>
            </div>`;
        }

        function renderComparePanel(tool, detail) {
            return `<div class="compare-grid"><div class="compare-card"><div class="compare-label">授权模式</div><div class="compare-value">${escapeHTML(detail.compare.license)}</div></div><div class="compare-card"><div class="compare-label">学习成本</div><div class="compare-value">${escapeHTML(detail.compare.learning)}</div></div><div class="compare-card"><div class="compare-label">最佳用途</div><div class="compare-value">${escapeHTML(detail.compare.bestFor)}</div></div><div class="compare-card"><div class="compare-label">常用输出</div><div class="compare-value">${escapeHTML(detail.compare.output)}</div></div></div><div class="detail-card" style="margin-top:1.25rem;"><div class="detail-card-title">选择建议</div><p class="detail-intro">如果你更看重可复现、批量处理和版本控制，可以优先选择代码化或开源工具；如果你更看重团队协作、模板和企业合规，可以优先考虑云端协作或商业工具。${escapeHTML(tool.name)} 的优势主要集中在：${escapeHTML(tool.features.slice(0, 3).join('、'))}。</p></div>`;
        }

        function renderResourcesPanel(tool) {
            const resources = [
                ['官网入口', '访问工具官方网站或在线编辑器', tool.link, 'fa-external-link-alt'],
                ['使用文档', '查看官方教程、帮助中心或 API 文档', tool.doc, 'fa-book'],
                ['推荐用途', tool.tags.slice(0, 3).join('、'), tool.link, 'fa-lightbulb'],
                ['平台支持', tool.platforms.join(' / '), tool.doc, 'fa-desktop']
            ];
            return `<div class="resource-grid">${resources.map(([title, desc, url, icon]) => `<a class="resource-link-card" href="${escapeHTML(url)}" target="_blank" rel="noopener noreferrer"><div class="resource-icon">${getIcon(icon)}</div><div><div class="resource-title">${escapeHTML(title)}</div><div class="resource-desc">${escapeHTML(desc)}</div></div></a>`).join('')}</div>`;
        }

        let currentModalData = null;

        function openModal(toolId, catKey) {
            const tool = getToolById(toolId, catKey);
            if (!tool) return;
            currentModalData = { tool, catKey };
            const meta = categoryMeta[catKey];
            const detail = { ...buildDefaultDetail(tool, catKey), ...(tool.detail || {}) };

            const modal = document.getElementById('modal');
            modal.style.setProperty('--detail-accent', meta?.accent || 'var(--c1)');
            document.getElementById('modalIcon').innerHTML = getIcon(tool.icon);
            document.getElementById('modalTitle').textContent = tool.name;
            const badge = document.getElementById('modalPrimaryBadge');
            badge.className = `card-badge ${tool.badge}`;
            badge.textContent = tool.badgeText;
            document.getElementById('modalSubtitle').innerHTML = `<span>${escapeHTML(tool.vendor)}</span><span>/</span>${tool.tags.slice(0, 4).map(t => `<span>${escapeHTML(t)}</span>`).join('<span>/</span>')}${tool.platforms.map(p => `<span class="detail-quick-badge">${getIcon(getPlatformIcon(p))} ${escapeHTML(p)}</span>`).join('')}`;

            document.getElementById('panelOverview').innerHTML = renderOverviewPanel(tool, catKey, detail);
            document.getElementById('panelExample').innerHTML = renderExamplePanel(tool, catKey, detail);
            document.getElementById('panelSteps').innerHTML = renderStepsPanel(detail);
            document.getElementById('panelCode').innerHTML = renderCodePanel(tool, detail);
            document.getElementById('panelCompare').innerHTML = renderComparePanel(tool, detail);
            document.getElementById('panelResources').innerHTML = renderResourcesPanel(tool);

            document.querySelectorAll('.detail-tab').forEach((tab, index) => tab.classList.toggle('active', index === 0));
            document.querySelectorAll('.detail-panel').forEach(panel => panel.classList.toggle('active', panel.dataset.panel === 'overview'));
            bindCopyCode();
            
            // 绑定示例图片点击事件
            setTimeout(() => {
                const exampleImages = document.querySelectorAll('.example-canvas img');
                exampleImages.forEach(img => {
                    img.addEventListener('click', function() {
                        openImageFullscreen(this.src, this.alt);
                    });
                });
            }, 100);

            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
            currentModalData = null;
        }

        function initModal() {
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
            document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
            document.querySelectorAll('.detail-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelector(`[data-panel="${tab.dataset.tab}"]`)?.classList.add('active');
                });
            });
        }

        function bindCopyCode() {
            const btn = document.querySelector('[data-copy-code]');
            const code = document.getElementById('detailCodeBlock')?.textContent || '';
            if (!btn) return;
            btn.onclick = async () => {
                try {
                    await navigator.clipboard.writeText(code);
                    btn.textContent = '已复制';
                    setTimeout(() => btn.textContent = '复制代码', 1200);
                } catch (e) {
                    btn.textContent = '复制失败';
                    setTimeout(() => btn.textContent = '复制代码', 1200);
                }
            };
        }

        function performSearch(query) {
            query = query.toLowerCase().trim();
            document.querySelectorAll('.empty-state').forEach(el => el.remove());
            if (!query) {
                document.querySelectorAll('.tool-card, .cat-card').forEach(card => card.style.display = '');
                return;
            }
            let matchCount = 0;
            document.querySelectorAll('.tool-card').forEach(card => {
                const searchText = card.textContent.toLowerCase();
                const matched = searchText.includes(query);
                card.style.display = matched ? '' : 'none';
                if (matched) matchCount++;
            });
            document.querySelectorAll('.cat-card').forEach(card => {
                card.style.display = card.textContent.toLowerCase().includes(query) ? '' : 'none';
            });
            if (currentPage !== 'home' && matchCount === 0) {
                const grid = document.getElementById(`grid-${currentPage}`);
                if (grid) {
                    const emptyEl = document.createElement('div');
                    emptyEl.className = 'empty-state';
                    emptyEl.style.cssText = 'grid-column: 1 / -1;';
                    emptyEl.innerHTML = `<div style="font-size:3rem;opacity:.2;margin-bottom:1rem;">${getIcon('fa-magnifying-glass-chart')}</div><p>未找到与 "<strong>${escapeHTML(query)}</strong>" 相关的工具</p>`;
                    grid.appendChild(emptyEl);
                }
            }
        }

        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            let timer;
            searchInput.addEventListener('input', e => {
                clearTimeout(timer);
                timer = setTimeout(() => performSearch(e.target.value), 250);
            });
            searchInput.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    searchInput.value = '';
                    performSearch('');
                    searchInput.blur();
                }
            });
        }

        function toggleTheme() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            const light = body.getAttribute('data-theme') === 'light';
            if (light) {
                body.removeAttribute('data-theme');
                themeToggle.classList.remove('active');
                localStorage.setItem('theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                themeToggle.classList.add('active');
                localStorage.setItem('theme', 'light');
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            const themeToggle = document.getElementById('themeToggle');
            if (savedTheme === 'light') {
                document.body.setAttribute('data-theme', 'light');
                themeToggle.classList.add('active');
            }
            themeToggle.addEventListener('click', toggleTheme);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        }

        function initSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            if (localStorage.getItem('sidebarCollapsed') === 'true') sidebar.classList.add('collapsed');
            toggleBtn.addEventListener('click', toggleSidebar);
            mobileMenuBtn.addEventListener('click', () => sidebar.classList.toggle('mobile-open'));
            document.addEventListener('click', e => {
                if (window.innerWidth <= 768 && sidebar.classList.contains('mobile-open') && !sidebar.contains(e.target) && !mobileMenuBtn.contains(e.target)) sidebar.classList.remove('mobile-open');
            });
        }

        function initRouter() {
            const hash = window.location.hash.replace('#', '');
            if (hash && categoryMeta[hash]) setTimeout(() => navigateTo(hash), 100);
            window.addEventListener('hashchange', () => {
                const newHash = window.location.hash.replace('#', '');
                if (newHash !== currentPage && categoryMeta[newHash]) navigateTo(newHash);
            });
        }

        function initResponsive() {
            const checkMobile = () => {
                const mobileMenuBtn = document.getElementById('mobileMenuBtn');
                if (window.innerWidth <= 768) mobileMenuBtn.style.display = 'flex';
                else {
                    mobileMenuBtn.style.display = 'none';
                    document.getElementById('sidebar')?.classList.remove('mobile-open');
                }
            };
            checkMobile();
            window.addEventListener('resize', checkMobile);
        }

        function initKeyboard() {
            document.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput')?.focus(); }
                if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); toggleSidebar(); }
                if ((e.ctrlKey || e.metaKey) && e.key >= '1' && e.key <= '9') {
                    e.preventDefault();
                    const cats = ['home', 'flowchart', 'mindmap', 'chart', '3dmodel', 'code', 'sim', 'science', 'aiart'];
                    navigateTo(cats[parseInt(e.key) - 1]);
                }
            });
        }

        function updateTotals() {
            const total = Object.values(toolsData).reduce((sum, arr) => sum + arr.length, 0);
            document.getElementById('sidebarTotal').textContent = total;
            document.getElementById('heroTotal').textContent = `${total}+`;
            document.getElementById('heroTotalNum').textContent = `${total}+`;
        }

        function openImageFullscreen(src, alt) {
            const overlay = document.getElementById('imageFullscreenOverlay');
            const img = document.getElementById('imageFullscreenImg');
            img.src = src;
            img.alt = alt;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeImageFullscreen() {
            const overlay = document.getElementById('imageFullscreenOverlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function initImageFullscreen() {
            const overlay = document.getElementById('imageFullscreenOverlay');
            const img = document.getElementById('imageFullscreenImg');
            const closeBtn = document.getElementById('imageFullscreenClose');

            // --- 状态变量 ---
            let isZooming = false; // 是否处于放大状态（用于判断是否需要拖拽）
            let isDragging = false; // 是否正在拖拽
            let currentScale = 1;   // 当前缩放比例
            let startX, startY;     // 鼠标按下时的坐标
            let translateX = 0;     // 图片当前的水平位移
            let translateY = 0;     // 图片当前的垂直位移

            // --- 1. 重置图片状态 ---
            function resetImage() {
                currentScale = 1;
                translateX = 0;
                translateY = 0;
                isZooming = false;
                // 恢复 CSS 初始状态
                img.style.transform = 'scale(1)';
                img.style.maxWidth = '100%';
                img.style.maxHeight = '100%';
                img.style.cursor = 'zoom-in'; // 缩小时是放大镜
            }

            // --- 2. 更新图片 Transform ---
            // 将 scale(缩放) 和 translate(位移) 结合
            function updateTransform() {
                img.style.transform = `scale(${currentScale}) translate(${translateX}px, ${translateY}px)`;
            }

            // --- 3. 打开图片 ---
            function handleOpenImageFullscreen(src, alt) {
                img.src = src;
                img.alt = alt;
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                resetImage(); // 每次打开重置
                img.style.cursor = 'zoom-in'; // 确保初始光标
            }

            // --- 4. 缩放逻辑 (Ctrl + 滚轮) ---
            function handleWheel(e) {
                if (!e.ctrlKey || !overlay.classList.contains('active')) return;
                e.preventDefault();

                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                const oldScale = currentScale;
                currentScale = Math.min(Math.max(0.5, currentScale * delta), 5);

                // --- 关键：根据鼠标位置缩放 (可选，进阶体验) ---
                // 这行代码让图片缩放的中心点是鼠标所在位置，体验更好
                // 如果觉得复杂，可以先注释掉下面这行，直接用简单的缩放
                // translateX -= (e.clientX - translateX) * (currentScale / oldScale - 1);
                // translateY -= (e.clientY - translateY) * (currentScale / oldScale - 1);

                if (currentScale > 1) {
                    isZooming = true;
                    img.style.maxWidth = 'none';
                    img.style.maxHeight = 'none';
                    img.style.cursor = 'grab'; // 缩放后光标变成手型
                    updateTransform();
                } else {
                    // 缩小回原状，重置位移
                    isZooming = false;
                    translateX = 0;
                    translateY = 0;
                    resetImage();
                }
            }

            // --- 5. 拖拽逻辑 (鼠标左键) ---
            function handleMouseDown(e) {
                // 只有在放大状态且点击左键才拖拽
                if (!isZooming || e.button !== 0) return;
                e.preventDefault(); // 防止选中图片或文字
                
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                img.style.cursor = 'grabbing'; // 按下时变成抓紧的手
            }

            function handleMouseMove(e) {
                if (!isDragging) return;
                // 计算位移差值
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                updateTransform();
            }

            function handleMouseUp() {
                isDragging = false;
                if (isZooming) {
                    img.style.cursor = 'grab'; // 松开后恢复抓取手型
                }
            }

            // --- 6. 关闭图片 ---
            function handleCloseImageFullscreen() {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
                // 清理可能残留的拖拽状态
                isDragging = false;
                resetImage();
            }

            // --- 事件绑定 ---

            // 滚轮缩放
            img.addEventListener('wheel', handleWheel, { passive: false });

            // 鼠标拖拽事件
            img.addEventListener('mousedown', handleMouseDown);
            document.addEventListener('mousemove', handleMouseMove); // 监听全局移动，防止鼠标移太快脱离图片
            document.addEventListener('mouseup', handleMouseUp);   // 监听全局松开，防止鼠标移出窗口

            // 关闭按钮和遮罩
            closeBtn.addEventListener('click', handleCloseImageFullscreen);
            overlay.addEventListener('click', e => { 
                if (e.target === overlay) handleCloseImageFullscreen(); 
            });

            // 键盘事件
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape' && overlay.classList.contains('active')) {
                    handleCloseImageFullscreen();
                }
            });

            // --- 暴露给外部调用 ---
            window.openImageFullscreen = handleOpenImageFullscreen;
        }

        function init() {
            buildNavigation();
            renderPages();
            bindCards();
            initNavigation();
            initModal();
            initSearch();
            initTheme();
            initSidebar();
            initRouter();
            initResponsive();
            initKeyboard();
            initImageFullscreen();
            updateTotals();
            setTimeout(() => {
                const loadingOverlay = document.getElementById('loadingOverlay');
                loadingOverlay?.classList.add('hidden');
                setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 600);
            }, 500);
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    </script>
</body>
</html>
